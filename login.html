<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>サインイン - CHIDACINEMA</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>

    <div class="main-layout">
        <div class="image-area">
            <div class="vignette"></div>
        </div>

        <div class="form-area">
            <div class="lang-switch">
                <button id="lang-btn" onclick="toggleLanguage()">
                    <span class="material-symbols-outlined">language</span>
                    <span id="lang-text">EN</span>
                </button>
            </div>

            <div class="close-x" onclick="location.reload()">
                <span class="material-symbols-outlined">close</span>
            </div>

            <div class="brand-logo">
                <img src="assets/logo.png" alt="ChidaFilm">
            </div>

            <div class="login-wrapper">
                <header>
                    <h1>サインイン</h1>
                    <p>CHIDACINEMAへおかえりなさい</p>
                </header>

                <form id="login-form">
                    <div class="field-group">
                        <label for="user">ユーザー名</label>
                        <div class="input-container">
                            <span class="material-symbols-outlined left-icon">person</span>
                            <input type="text" id="user" placeholder="ユーザー名を入力" required>
                        </div>
                    </div>

                    <div class="field-group">
                        <label for="pass">パスワード</label>
                        <div class="input-container">
                            <span class="material-symbols-outlined left-icon">lock</span>
                            <input type="password" id="pass" placeholder="パスワードを入力" required>
                            <span class="material-symbols-outlined right-icon" id="toggle-pass">visibility</span>
                        </div>
                    </div>

                    <div class="stay-signed-in">
                     <input type="checkbox" id="remember" checked>
                     <label for="remember">ログイン状態を記憶する</label>
                    </div>

                    <button type="submit" id="login-btn" class="primary-signin-btn">
                        <span class="material-symbols-outlined">login</span>
                        <span class="btn-text">サインイン</span>
                    </button>

                    <div id="login-msg"></div>
                </form>

                <div class="signup-prompt">
                    <span>アカウントをお持ちでないですか？</span>
                </div>

                <button class="secondary-create-btn" id="guest-login-btn">
                    新しいアカウントを作成
                    <span class="material-symbols-outlined">chevron_right</span>
                </button>
            </div>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
