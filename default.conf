server {
    listen       80;
    server_name  localhost;

    # 1. 普通のファイル（HTML, CSS, JS）を返す
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html; # SPAのルーティングに対応
    }

    # 2. Jellyfin API への通信をここで「実際のJellyfin」へ中継（CORS回避）
    location /jellyfin-api/ {
        # ⚠️ ここをご自身のJellyfinサーバーのIPとポートに書き換えてください ⚠️
        # 例: proxy_pass http://192.168.1.50:8096/;
        proxy_pass http://192.168.x.x:8096/; 

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 🌟 追加：動画ストリーミングの遅延・音ズレ防止用（バッファリング無効化とWebSocket対応）
        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # サイズ制限の緩和と長時間の動画視聴に向けたタイムアウト防止
        client_max_body_size 20M;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
